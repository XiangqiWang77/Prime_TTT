<text x="72.0" y="690.0" font-size="38" font-weight="700" fill="#1f2933" text-anchor="start" class="">RelPT optimizer 做的事情</text>
<rect x="72" y="724" width="254" height="54" rx="27" fill="#e8eef7" stroke="#ccd3dd" stroke-width="1"/>
<text x="199.0" y="760.0" font-size="24" font-weight="700" fill="#1f2933" text-anchor="middle" class="">1</text>
<text x="372.0" y="760.0" font-size="30" font-weight="700" fill="#1f2933" text-anchor="start" class="">LEFT JOIN prompt/trajectory</text>
<text x="372.0" y="802.0" font-size="27" font-weight="400" fill="#5e6978" text-anchor="start" class="">找当前 policy 下缺多少 rollout</text>
<rect x="72" y="852" width="254" height="54" rx="27" fill="#e8eef7" stroke="#ccd3dd" stroke-width="1"/>
<text x="199.0" y="888.0" font-size="24" font-weight="700" fill="#1f2933" text-anchor="middle" class="">2</text>
<text x="372.0" y="888.0" font-size="30" font-weight="700" fill="#1f2933" text-anchor="start" class="">JOIN trajectory/reward_cache</text>
<text x="372.0" y="930.0" font-size="27" font-weight="400" fill="#5e6978" text-anchor="start" class="">同一 prompt + 同一 response hash 的 reward 直接复用</text>
<rect x="72" y="980" width="254" height="54" rx="27" fill="#e8eef7" stroke="#ccd3dd" stroke-width="1"/>
<text x="199.0" y="1016.0" font-size="24" font-weight="700" fill="#1f2933" text-anchor="middle" class="">3</text>
<text x="372.0" y="1016.0" font-size="30" font-weight="700" fill="#1f2933" text-anchor="start" class="">LEFT JOIN trajectory/logprob</text>
<text x="372.0" y="1058.0" font-size="27" font-weight="400" fill="#5e6978" text-anchor="start" class="">只对缺 logprob 的 trajectory 调 executor</text>
<rect x="72" y="1108" width="254" height="54" rx="27" fill="#e8eef7" stroke="#ccd3dd" stroke-width="1"/>
<text x="199.0" y="1144.0" font-size="24" font-weight="700" fill="#1f2933" text-anchor="middle" class="">4</text>
<text x="372.0" y="1144.0" font-size="30" font-weight="700" fill="#1f2933" text-anchor="start" class="">JOIN 完整 rows</text>
<text x="372.0" y="1186.0" font-size="27" font-weight="400" fill="#5e6978" text-anchor="start" class="">materialize 成 PPO batch 交给 trainer</text>
<line x1="72" y1="1680" x2="1168" y2="1680" stroke="#d7dbe2" stroke-width="2"/>
<text x="72.0" y="1719.0" font-size="21" font-weight="400" fill="#697386" text-anchor="start" class="">RelPT report generated from this repository</text>
