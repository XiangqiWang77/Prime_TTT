<svg xmlns="http://www.w3.org/2000/svg" width="1240" height="1754" viewBox="0 0 1240 1754">
<rect width="100%" height="100%" fill="#fbfaf7"/>
<style>text{font-family:DejaVu Sans, Arial, sans-serif;fill:#1f2933}.muted{fill:#5f6978}.mono{font-family:DejaVu Sans Mono,monospace}</style>
<text x="72.0" y="62.0" font-size="23" font-weight="400" fill="#697386" text-anchor="start" class="">Why DB optimization applies</text>
<line x1="72.0" y1="82.0" x2="1168.0" y2="82.0" stroke="#d7dbe2" stroke-width="2"/>
<text x="72.0" y="155.0" font-size="48" font-weight="700" fill="#1f2933" text-anchor="start" class="">Why a DB optimizer can help</text>
<rect x="72.0" y="270.0" width="1096.0" height="165.0" rx="8" fill="#ffffff" stroke="#d4dae3" stroke-width="2"/>
<text x="106.0" y="330.0" font-size="32" font-weight="700" fill="#1f2933" text-anchor="start" class="">Stable keys</text>
<text x="402.0" y="330.0" font-size="27" font-weight="400" fill="#394150" text-anchor="start" class="">prompt_id, policy_id, traj_id, reward_model_id, response_hash</text>
<rect x="72.0" y="468.0" width="1096.0" height="165.0" rx="8" fill="#ffffff" stroke="#d4dae3" stroke-width="2"/>
<text x="106.0" y="528.0" font-size="32" font-weight="700" fill="#1f2933" text-anchor="start" class="">Append-only facts</text>
<text x="402.0" y="528.0" font-size="27" font-weight="400" fill="#394150" text-anchor="start" class="">executor outputs are durable rows, not hidden process state</text>
<rect x="72.0" y="666.0" width="1096.0" height="165.0" rx="8" fill="#ffffff" stroke="#d4dae3" stroke-width="2"/>
<text x="106.0" y="726.0" font-size="32" font-weight="700" fill="#1f2933" text-anchor="start" class="">Completeness query</text>
<text x="402.0" y="726.0" font-size="27" font-weight="400" fill="#394150" text-anchor="start" class="">PPO input is complete only after the artifact joins succeed</text>
<rect x="72.0" y="864.0" width="1096.0" height="165.0" rx="8" fill="#ffffff" stroke="#d4dae3" stroke-width="2"/>
<text x="106.0" y="924.0" font-size="32" font-weight="700" fill="#1f2933" text-anchor="start" class="">Anti-join worklists</text>
<text x="402.0" y="924.0" font-size="27" font-weight="400" fill="#394150" text-anchor="start" class="">missing rows are exactly what expensive executors must produce</text>
<rect x="72.0" y="1062.0" width="1096.0" height="165.0" rx="8" fill="#ffffff" stroke="#d4dae3" stroke-width="2"/>
<text x="106.0" y="1122.0" font-size="32" font-weight="700" fill="#1f2933" text-anchor="start" class="">Cost asymmetry</text>
<text x="402.0" y="1122.0" font-size="27" font-weight="400" fill="#394150" text-anchor="start" class="">rollout/reward/logprob are costly; SQL joins and indexes are cheap</text>
<rect x="72.0" y="1310.0" width="1096.0" height="135.0" rx="8" fill="#f6fff8" stroke="#92c9a2" stroke-width="2"/>
<text x="106.0" y="1370.0" font-size="32" font-weight="700" fill="#1f2933" text-anchor="start" class="">Important boundary</text>
<text x="402.0" y="1370.0" font-size="27" font-weight="400" fill="#1f2933" text-anchor="start" class="">RelPT optimizes artifact construction, not PPO loss math.</text>
<line x1="72.0" y1="1680.0" x2="1168.0" y2="1680.0" stroke="#d7dbe2" stroke-width="2"/>
<text x="72.0" y="1719.0" font-size="21" font-weight="400" fill="#697386" text-anchor="start" class="">Prime_TTT RelPT report generated from this repository</text>
<text x="1168.0" y="1719.0" font-size="21" font-weight="400" fill="#697386" text-anchor="end" class="">6</text>
</svg>