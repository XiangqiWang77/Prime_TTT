<text x="72.0" y="62.0" font-size="23" font-weight="400" fill="#697386" text-anchor="start" class="">Partial rollout example</text>
<line x1="72.0" y1="82.0" x2="1168.0" y2="82.0" stroke="#d7dbe2" stroke-width="2"/>
<text x="72.0" y="155.0" font-size="43" font-weight="700" fill="#1f2933" text-anchor="start" class="">Example: partial rollout, K=4 to K=6</text>
<text x="72.0" y="210.0" font-size="30" font-weight="400" fill="#4b5563" text-anchor="start" class="">The target relation expands; existing rows stay valid.</text>
<rect x="72.0" y="310.0" width="1096.0" height="250.0" rx="8" fill="#ffffff" stroke="#d4dae3" stroke-width="2"/>
<text x="106.0" y="372.0" font-size="34" font-weight="700" fill="#1f2933" text-anchor="start" class="">Per prompt</text>
<rect x="142.0" y="420.0" width="260.0" height="100.0" rx="8" fill="#f6fff8" stroke="#cbd3df" stroke-width="2"/>
<text x="272.0" y="464.0" font-size="24" font-weight="700" fill="#1f2933" text-anchor="middle" class="">existing</text>
<text x="272.0" y="498.0" font-size="20" font-weight="400" fill="#697386" text-anchor="middle" class="">4 trajectories</text>
<rect x="492.0" y="420.0" width="260.0" height="100.0" rx="8" fill="#f7fbff" stroke="#cbd3df" stroke-width="2"/>
<text x="622.0" y="464.0" font-size="24" font-weight="700" fill="#1f2933" text-anchor="middle" class="">target</text>
<text x="622.0" y="498.0" font-size="20" font-weight="400" fill="#697386" text-anchor="middle" class="">6 trajectories</text>
<rect x="842.0" y="420.0" width="260.0" height="100.0" rx="8" fill="#fff7ed" stroke="#cbd3df" stroke-width="2"/>
<text x="972.0" y="464.0" font-size="24" font-weight="700" fill="#1f2933" text-anchor="middle" class="">missing</text>
<text x="972.0" y="498.0" font-size="20" font-weight="400" fill="#697386" text-anchor="middle" class="">2 trajectories</text>
<line x1="402.0" y1="470.0" x2="492.0" y2="470.0" stroke="#596579" stroke-width="3"/>
<path d="M492.0,470.0 l-16,-9 l0,18 z" fill="#596579"/>
<line x1="752.0" y1="470.0" x2="842.0" y2="470.0" stroke="#596579" stroke-width="3"/>
<path d="M842.0,470.0 l-16,-9 l0,18 z" fill="#596579"/>
<rect x="72.0" y="700.0" width="500.0" height="330.0" rx="8" fill="#fff7ed" stroke="#efc58d" stroke-width="2"/>
<text x="106.0" y="765.0" font-size="34" font-weight="700" fill="#1f2933" text-anchor="start" class="">Naive pipeline</text>
<text x="106.0" y="835.0" font-size="31" font-weight="400" fill="#1f2933" text-anchor="start" class="">96 prompts x 6</text>
<text x="106.0" y="900.0" font-size="36" font-weight="700" fill="#1f2933" text-anchor="start" class="">= 576 rollout calls</text>
<text x="106.0" y="960.0" font-size="25" font-weight="400" fill="#697386" text-anchor="start" class="">384 reusable rows are ignored</text>
<rect x="668.0" y="700.0" width="500.0" height="330.0" rx="8" fill="#f6fff8" stroke="#92c9a2" stroke-width="2"/>
<text x="702.0" y="765.0" font-size="34" font-weight="700" fill="#1f2933" text-anchor="start" class="">RelPT</text>
<text x="702.0" y="835.0" font-size="31" font-weight="400" fill="#1f2933" text-anchor="start" class="">96 prompts x (6 - 4)</text>
<text x="702.0" y="900.0" font-size="36" font-weight="700" fill="#1f2933" text-anchor="start" class="">= 192 rollout calls</text>
<text x="702.0" y="960.0" font-size="25" font-weight="400" fill="#697386" text-anchor="start" class="">only missing rows call rollout</text>
<rect x="72.0" y="1190.0" width="1096.0" height="210.0" rx="8" fill="#f8fbff" stroke="#c8d7ea" stroke-width="2"/>
<text x="106.0" y="1250.0" font-size="34" font-weight="700" fill="#1f2933" text-anchor="start" class="">SQL sketch</text>
<text x="106.0" y="1310.0" font-size="25" font-weight="400" fill="#1f2933" text-anchor="start" class="mono">GROUP BY prompt_id, policy_id; existing_k = count(trajectory)</text>
<text x="106.0" y="1360.0" font-size="25" font-weight="400" fill="#1f2933" text-anchor="start" class="mono">rollout_requests = target_k - existing_k where existing_k &lt; target_k</text>
