<text x="94.0" y="790.0" font-size="24" font-weight="700" fill="#1f2933" text-anchor="start" class="mono">metric</text>
<text x="372.0" y="790.0" font-size="24" font-weight="400" fill="#1f2933" text-anchor="start" class="">runtime, row-count, reward, and system metrics</text>
<rect x="72.0" y="930.0" width="1096.0" height="430.0" rx="8" fill="#f8fbff" stroke="#c8d7ea" stroke-width="2"/>
<text x="106.0" y="990.0" font-size="34" font-weight="700" fill="#1f2933" text-anchor="start" class="">Join semantics</text>
<text x="106.0" y="1050.0" font-size="29" font-weight="400" fill="#1f2933" text-anchor="start" class="">The important join is not only by trajectory id.</text>
<text x="106.0" y="1092.0" font-size="29" font-weight="400" fill="#1f2933" text-anchor="start" class="">reward_cache joins on reward_model_id, prompt_id, and</text>
<text x="106.0" y="1134.0" font-size="29" font-weight="400" fill="#1f2933" text-anchor="start" class="">response_hash, so deterministic rewards can be reused</text>
<text x="106.0" y="1176.0" font-size="29" font-weight="400" fill="#1f2933" text-anchor="start" class="">across policy versions when the same prompt-response pair</text>
<text x="106.0" y="1218.0" font-size="29" font-weight="400" fill="#1f2933" text-anchor="start" class="">appears again. Other LEFT JOINs identify missing rollouts,</text>
<text x="106.0" y="1260.0" font-size="29" font-weight="400" fill="#1f2933" text-anchor="start" class="">rewards, logprobs, and advantages.</text>
