<text x="372.0" y="732.0" font-size="24" font-weight="400" fill="#1f2933" text-anchor="start" class="">input policy, output policy, batch, trainer lineage</text>
<rect x="72.0" y="752.0" width="270.0" height="58.0" rx="2" fill="#f3f6fa" stroke="#d6dce5" stroke-width="1"/>
