<text x="106.0" y="1088.0" font-size="34" font-weight="700" fill="#1f2933" text-anchor="start" class="">Why this wastes work</text>
<text x="106.0" y="1150.0" font-size="30" font-weight="400" fill="#1f2933" text-anchor="start" class="">A failed run, retry, cache miss investigation, or</text>
<text x="106.0" y="1193.0" font-size="30" font-weight="400" fill="#1f2933" text-anchor="start" class="">change from K=4 to K=6 can ask for almost the same</text>
<text x="106.0" y="1236.0" font-size="30" font-weight="400" fill="#1f2933" text-anchor="start" class="">batch again. A naive pipeline has no durable artifact</text>
<text x="106.0" y="1279.0" font-size="30" font-weight="400" fill="#1f2933" text-anchor="start" class="">map, so it often regenerates responses and rescans</text>
<text x="106.0" y="1322.0" font-size="30" font-weight="400" fill="#1f2933" text-anchor="start" class="">rewards even when most rows already exist.</text>
