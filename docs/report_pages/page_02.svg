<rect x="72.0" y="920.0" width="1096.0" height="370.0" rx="8" fill="#ffffff" stroke="#d4dae3" stroke-width="2"/>
<text x="106.0" y="982.0" font-size="34" font-weight="700" fill="#1f2933" text-anchor="start" class="">Relational formulation</text>
<text x="106.0" y="1048.0" font-size="27" font-weight="400" fill="#1f2933" text-anchor="start" class="">- trajectory joins prompt on prompt_id and policy on policy_id</text>
<text x="106.0" y="1100.0" font-size="27" font-weight="400" fill="#1f2933" text-anchor="start" class="">- reward joins trajectory on traj_id plus reward_model_id</text>
<text x="106.0" y="1152.0" font-size="27" font-weight="400" fill="#1f2933" text-anchor="start" class="">- logprob joins trajectory on traj_id plus old_policy_id</text>
<text x="106.0" y="1204.0" font-size="27" font-weight="400" fill="#1f2933" text-anchor="start" class="">- advantage joins reward/logprob for derived training credit</text>
<text x="106.0" y="1256.0" font-size="27" font-weight="400" fill="#1f2933" text-anchor="start" class="">- batch is the materialized set of complete joined rows</text>
<rect x="72.0" y="1370.0" width="1096.0" height="90.0" rx="8" fill="#f8fbff" stroke="#c8d7ea" stroke-width="2"/>
<text x="106.0" y="1425.0" font-size="27" font-weight="700" fill="#1f2933" text-anchor="start" class="">SQL JOIN is not cosmetic; it is the PPO data contract made explicit.</text>
<line x1="72.0" y1="1680.0" x2="1168.0" y2="1680.0" stroke="#d7dbe2" stroke-width="2"/>
