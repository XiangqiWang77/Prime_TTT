<svg xmlns="http://www.w3.org/2000/svg" width="1240" height="1754" viewBox="0 0 1240 1754">
<rect width="100%" height="100%" fill="#fbfaf7"/>
<style>text{font-family:DejaVu Sans, Arial, sans-serif;fill:#1f2933}.muted{fill:#5f6978}.mono{font-family:DejaVu Sans Mono,monospace}</style>
<text x="72.0" y="62.0" font-size="23" font-weight="400" fill="#697386" text-anchor="start" class="">Implementation map</text>
<line x1="72.0" y1="82.0" x2="1168.0" y2="82.0" stroke="#d7dbe2" stroke-width="2"/>
<text x="72.0" y="155.0" font-size="45" font-weight="700" fill="#1f2933" text-anchor="start" class="">Two implementations, one control-layer idea</text>
<rect x="72.0" y="250.0" width="1096.0" height="420.0" rx="8" fill="#ffffff" stroke="#d4dae3" stroke-width="2"/>
<text x="106.0" y="310.0" font-size="34" font-weight="700" fill="#1f2933" text-anchor="start" class="">Full SQLite RelPT prototype</text>
<text x="106.0" y="370.0" font-size="29" font-weight="400" fill="#1f2933" text-anchor="start" class="">`relpt.py` creates the append-only schema and implements</text>
<text x="106.0" y="412.0" font-size="29" font-weight="400" fill="#1f2933" text-anchor="start" class="">`RelPT.plan_ppo_batch` plus `RelPT.prepare_ppo_batch`.</text>
<text x="106.0" y="454.0" font-size="29" font-weight="400" fill="#1f2933" text-anchor="start" class="">Rollout, reward, logprob, and PPO training are black-box</text>
<text x="106.0" y="496.0" font-size="29" font-weight="400" fill="#1f2933" text-anchor="start" class="">executors, which makes the relational contract testable</text>
<text x="106.0" y="538.0" font-size="29" font-weight="400" fill="#1f2933" text-anchor="start" class="">without GPU LLM frameworks.</text>
<rect x="72.0" y="760.0" width="1096.0" height="430.0" rx="8" fill="#ffffff" stroke="#d4dae3" stroke-width="2"/>
<text x="106.0" y="820.0" font-size="34" font-weight="700" fill="#1f2933" text-anchor="start" class="">Same-framework TRL PPO comparison</text>
<text x="106.0" y="880.0" font-size="29" font-weight="400" fill="#1f2933" text-anchor="start" class="">`trl_gsm8k_relpt_ppo.py` keeps both arms on the same TRL</text>
<text x="106.0" y="922.0" font-size="29" font-weight="400" fill="#1f2933" text-anchor="start" class="">PPOTrainer path. The RelPT arm caches prepared query,</text>
<text x="106.0" y="964.0" font-size="29" font-weight="400" fill="#1f2933" text-anchor="start" class="">response, and reward rows for retry reuse; the baseline</text>
<text x="106.0" y="1006.0" font-size="29" font-weight="400" fill="#1f2933" text-anchor="start" class="">prepares them again. This isolates preparation efficiency</text>
<text x="106.0" y="1048.0" font-size="29" font-weight="400" fill="#1f2933" text-anchor="start" class="">from trainer changes.</text>
<rect x="72.0" y="1280.0" width="1096.0" height="160.0" rx="8" fill="#f6fff8" stroke="#92c9a2" stroke-width="2"/>
<text x="106.0" y="1340.0" font-size="32" font-weight="700" fill="#1f2933" text-anchor="start" class="">Boundary</text>
<text x="106.0" y="1392.0" font-size="29" font-weight="400" fill="#1f2933" text-anchor="start" class="">RelPT changes artifact planning and reuse. It does not change PPO loss.</text>
<line x1="72.0" y1="1680.0" x2="1168.0" y2="1680.0" stroke="#d7dbe2" stroke-width="2"/>
<text x="72.0" y="1719.0" font-size="21" font-weight="400" fill="#697386" text-anchor="start" class="">Prime_TTT RelPT report generated from this repository</text>
<text x="1168.0" y="1719.0" font-size="21" font-weight="400" fill="#697386" text-anchor="end" class="">5</text>
</svg>