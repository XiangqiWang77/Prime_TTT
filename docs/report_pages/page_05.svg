<svg xmlns="http://www.w3.org/2000/svg" width="1240" height="1754" viewBox="0 0 1240 1754">
<rect width="100%" height="100%" fill="#fbfaf7"/>
<style>text{font-family:Droid Sans Fallback, DejaVu Sans, Arial, sans-serif;fill:#1f2933} .muted{fill:#5e6978} .small{font-size:23px} .body{font-size:28px} .h1{font-size:54px;font-weight:700} .h2{font-size:38px;font-weight:700} .h3{font-size:30px;font-weight:700} .mono{font-family:Source Code Pro,DejaVu Sans Mono,monospace}</style>
<text x="72.0" y="62.0" font-size="23" font-weight="400" fill="#697386" text-anchor="start" class="">Implementation in this repository</text>
<line x1="72" y1="82" x2="1168" y2="82" stroke="#d7dbe2" stroke-width="2"/>
<text x="72.0" y="155.0" font-size="48" font-weight="700" fill="#1f2933" text-anchor="start" class="">这个仓库里的具体实现</text>
<rect x="72" y="245" width="1096" height="365" rx="8" fill="#ffffff" stroke="#cbd3df" stroke-width="2"/>
<text x="106.0" y="305.0" font-size="35" font-weight="700" fill="#1f2933" text-anchor="start" class="">完整 RelPT SQLite 原型</text>
<text x="106.0" y="365.0" font-size="29" font-weight="400" fill="#1f2933" text-anchor="start" class="">文件：relpt.py。核心类 RelPT 创建 append-only SQLite</text>
<text x="106.0" y="407.0" font-size="29" font-weight="400" fill="#1f2933" text-anchor="start" class="">tables。RelPT.plan_ppo_batch 生成缺失</text>
<text x="106.0" y="449.0" font-size="29" font-weight="400" fill="#1f2933" text-anchor="start" class="">worklist；RelPT.prepare_ppo_batch 调用</text>
<text x="106.0" y="491.0" font-size="29" font-weight="400" fill="#1f2933" text-anchor="start" class="">rollout/reward/logprob/trainer adapters。测试</text>
<text x="106.0" y="533.0" font-size="29" font-weight="400" fill="#1f2933" text-anchor="start" class="">test_relpt.py 验证同一个 PPO batch retry 不再调用昂贵</text>
<text x="106.0" y="575.0" font-size="29" font-weight="400" fill="#1f2933" text-anchor="start" class="">executor。</text>
<rect x="72" y="680" width="1096" height="365" rx="8" fill="#ffffff" stroke="#cbd3df" stroke-width="2"/>
<text x="106.0" y="740.0" font-size="35" font-weight="700" fill="#1f2933" text-anchor="start" class="">GSM8K simulated benchmark</text>
<text x="106.0" y="800.0" font-size="29" font-weight="400" fill="#1f2933" text-anchor="start" class="">文件：relpt_gsm8k_ppo.py。prompt 来自本地 GSM8K Arrow</text>
<text x="106.0" y="842.0" font-size="29" font-weight="400" fill="#1f2933" text-anchor="start" class="">cache；rollout/PPO executor 是 toy softmax policy</text>
<text x="106.0" y="884.0" font-size="29" font-weight="400" fill="#1f2933" text-anchor="start" class="">的模拟器。它验证完整 RelPT 表结构能省 rollout/reward/logprob</text>
<text x="106.0" y="926.0" font-size="29" font-weight="400" fill="#1f2933" text-anchor="start" class="">行数，但不是实模型质量实验。</text>
<rect x="72" y="1115" width="1096" height="365" rx="8" fill="#ffffff" stroke="#cbd3df" stroke-width="2"/>
<text x="106.0" y="1175.0" font-size="35" font-weight="700" fill="#1f2933" text-anchor="start" class="">真实 TRL PPO same-framework 对照</text>
<text x="106.0" y="1235.0" font-size="29" font-weight="400" fill="#1f2933" text-anchor="start" class="">文件：trl_gsm8k_relpt_ppo.py。baseline 和 RelPT 都调用同一个</text>
<text x="106.0" y="1277.0" font-size="29" font-weight="400" fill="#1f2933" text-anchor="start" class="">TRL PPOTrainer，同一个模型 sshleifer/tiny-gpt2，同一个</text>
<text x="106.0" y="1319.0" font-size="29" font-weight="400" fill="#1f2933" text-anchor="start" class="">GSM8K local Arrow cache。这里的 RelPT 是较小的 prepared-</text>
<text x="106.0" y="1361.0" font-size="29" font-weight="400" fill="#1f2933" text-anchor="start" class="">batch cache，目的是证明不改变 PPO update path 时也能减少重复</text>
<text x="106.0" y="1403.0" font-size="29" font-weight="400" fill="#1f2933" text-anchor="start" class="">batch preparation。</text>
<line x1="72" y1="1680" x2="1168" y2="1680" stroke="#d7dbe2" stroke-width="2"/>
<text x="72.0" y="1719.0" font-size="21" font-weight="400" fill="#697386" text-anchor="start" class="">RelPT report generated from this repository</text>
<text x="1168.0" y="1719.0" font-size="21" font-weight="400" fill="#697386" text-anchor="end" class="">5</text>
</svg>