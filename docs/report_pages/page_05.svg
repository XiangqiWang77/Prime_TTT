<rect x="72.0" y="900.0" width="1096.0" height="420.0" rx="8" fill="#ffffff" stroke="#d4dae3" stroke-width="2"/>
<text x="106.0" y="960.0" font-size="34" font-weight="700" fill="#1f2933" text-anchor="start" class="">Reuse rules are different for each table</text>
<text x="106.0" y="1032.0" font-size="25" font-weight="700" fill="#1f2933" text-anchor="start" class="mono">trajectory</text>
<text x="302.0" y="1032.0" font-size="24" font-weight="400" fill="#4b5563" text-anchor="start" class="">reused for same prompt, same policy, same rollout slot or response row</text>
<text x="106.0" y="1096.0" font-size="25" font-weight="700" fill="#1f2933" text-anchor="start" class="mono">reward_cache</text>
<text x="302.0" y="1096.0" font-size="24" font-weight="400" fill="#4b5563" text-anchor="start" class="">reused across policy versions if prompt + normalized response hash match</text>
<text x="106.0" y="1160.0" font-size="25" font-weight="700" fill="#1f2933" text-anchor="start" class="mono">logprob</text>
<text x="302.0" y="1160.0" font-size="24" font-weight="400" fill="#4b5563" text-anchor="start" class="">usually policy-specific; missing old-policy logprob must be computed</text>
<text x="106.0" y="1224.0" font-size="25" font-weight="700" fill="#1f2933" text-anchor="start" class="mono">advantage</text>
<text x="302.0" y="1224.0" font-size="24" font-weight="400" fill="#4b5563" text-anchor="start" class="">derived from reward/logprob; recompute only when inputs or baseline change</text>
<text x="106.0" y="1288.0" font-size="25" font-weight="700" fill="#1f2933" text-anchor="start" class="mono">batch</text>
<text x="302.0" y="1288.0" font-size="24" font-weight="400" fill="#4b5563" text-anchor="start" class="">materialized complete join; exact retry can reuse with zero executor calls</text>
<rect x="72.0" y="1390.0" width="1096.0" height="90.0" rx="8" fill="#f8fbff" stroke="#c8d7ea" stroke-width="2"/>
<text x="106.0" y="1445.0" font-size="25" font-weight="400" fill="#1f2933" text-anchor="start" class="">This is why the tables interact: a new upstream row changes which downstream joins are now complete.</text>
