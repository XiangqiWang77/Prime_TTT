<svg xmlns="http://www.w3.org/2000/svg" width="1240" height="1754" viewBox="0 0 1240 1754">
<rect width="100%" height="100%" fill="#fbfaf7"/>
<style>text{font-family:DejaVu Sans, Arial, sans-serif;fill:#1f2933}.muted{fill:#5f6978}.mono{font-family:DejaVu Sans Mono,monospace}</style>
<text x="72.0" y="62.0" font-size="23" font-weight="400" fill="#697386" text-anchor="start" class="">Prime_TTT / RelPT</text>
<line x1="72.0" y1="82.0" x2="1168.0" y2="82.0" stroke="#d7dbe2" stroke-width="2"/>
<text x="72.0" y="160.0" font-size="48" font-weight="700" fill="#1f2933" text-anchor="start" class="">RelPT: reusable PPO preparation</text>
<text x="72.0" y="218.0" font-size="42" font-weight="700" fill="#1f2933" text-anchor="start" class="">through relational artifact control</text>
<text x="72.0" y="295.0" font-size="31" font-weight="400" fill="#1f2933" text-anchor="start" class="">RelPT is the system layer in Prime_TTT that makes</text>
<text x="72.0" y="339.0" font-size="31" font-weight="400" fill="#1f2933" text-anchor="start" class="">post-training artifacts reusable. It records</text>
<text x="72.0" y="383.0" font-size="31" font-weight="400" fill="#1f2933" text-anchor="start" class="">prompts, rollouts, rewards, logprobs, advantages,</text>
<text x="72.0" y="427.0" font-size="31" font-weight="400" fill="#1f2933" text-anchor="start" class="">batches, policies, and updates as append-only</text>
<text x="72.0" y="471.0" font-size="31" font-weight="400" fill="#1f2933" text-anchor="start" class="">relational rows, then computes only the missing</text>
<text x="72.0" y="515.0" font-size="31" font-weight="400" fill="#1f2933" text-anchor="start" class="">delta before PPO.</text>
<rect x="72.0" y="555.0" width="1096.0" height="320.0" rx="8" fill="#ffffff" stroke="#d4dae3" stroke-width="2"/>
<text x="106.0" y="615.0" font-size="34" font-weight="700" fill="#1f2933" text-anchor="start" class="">The short version</text>
<text x="106.0" y="675.0" font-size="30" font-weight="400" fill="#1f2933" text-anchor="start" class="">Baseline preparation redoes generation, reward scoring,</text>
<text x="106.0" y="718.0" font-size="30" font-weight="400" fill="#1f2933" text-anchor="start" class="">and logprob work. RelPT first queries the artifact</text>
<text x="106.0" y="761.0" font-size="30" font-weight="400" fill="#1f2933" text-anchor="start" class="">tables. Existing rows are reused; only absent rows</text>
<text x="106.0" y="804.0" font-size="30" font-weight="400" fill="#1f2933" text-anchor="start" class="">trigger expensive executors. PPOTrainer still receives</text>
<text x="106.0" y="847.0" font-size="30" font-weight="400" fill="#1f2933" text-anchor="start" class="">the same batch shape.</text>
<text x="72.0" y="975.0" font-size="37" font-weight="700" fill="#1f2933" text-anchor="start" class="">What this report illustrates</text>
<text x="94.0" y="1040.0" font-size="28" font-weight="400" fill="#1f2933" text-anchor="start" class="">- Where RelPT sits around rollout, reward, logprob, and PPOTrainer.</text>
<text x="94.0" y="1095.0" font-size="28" font-weight="400" fill="#1f2933" text-anchor="start" class="">- How SQL joins turn retries and partial recomputation into delta work.</text>
<text x="94.0" y="1150.0" font-size="28" font-weight="400" fill="#1f2933" text-anchor="start" class="">- Which tables carry lineage for reproducibility and recovery.</text>
<text x="94.0" y="1205.0" font-size="28" font-weight="400" fill="#1f2933" text-anchor="start" class="">- What the latest same-framework TRL PPO measurement shows.</text>
<text x="94.0" y="1260.0" font-size="28" font-weight="400" fill="#1f2933" text-anchor="start" class="">- Why the result is a systems efficiency signal, not a model-quality claim.</text>
<line x1="72.0" y1="1680.0" x2="1168.0" y2="1680.0" stroke="#d7dbe2" stroke-width="2"/>
<text x="72.0" y="1719.0" font-size="21" font-weight="400" fill="#697386" text-anchor="start" class="">Prime_TTT RelPT report generated from this repository</text>
<text x="1168.0" y="1719.0" font-size="21" font-weight="400" fill="#697386" text-anchor="end" class="">1</text>
</svg>